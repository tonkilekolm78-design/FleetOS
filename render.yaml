# ============================================================
#  FleetOS — Render Deployment Configuration
#  render.yaml
#
#  Defines all three Render services:
#  1. fleetos-api     — Express API server (Web Service)
#  2. fleetos-gps     — TCP GPS Listener (Background Worker)
#  3. fleetos-db      — PostgreSQL database (managed)
#
#  Deploy: connect your GitHub repo to Render,
#  then run: render deploy --config render.yaml
# ============================================================

services:

  # ── 1. API Server (Web Service) ──────────────────────────────
  - type: web
    name: fleetos-api
    runtime: node
    plan: starter          # upgrade to standard when in production
    region: oregon         # or frankfurt if SA traffic — check Render regions
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true       # auto-deploy on git push to main

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: fleetos-db
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true    # Render auto-generates a secure value
      - key: JWT_EXPIRES_IN
        value: "8h"
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: ALLOWED_ORIGINS
        value: "https://fleetos.co.za,https://www.fleetos.co.za"
      - key: LOG_LEVEL
        value: "info"
      - key: CROSSCHECK_INTERVAL_MIN
        value: "5"
      - key: CPK_ALERT_THRESHOLD_PCT
        value: "15"
      - key: ETA_BREACH_THRESHOLD_MIN
        value: "15"
      - key: DWELL_ALERT_THRESHOLD_MIN
        value: "60"
      - key: EMPLOYEE_BASE_SALARY
        value: "18500"

  # ── 2. GPS TCP Listener (Background Worker) ──────────────────
  #  Runs continuously, listening for Teltonika device connections.
  #  Needs a TCP-capable plan — Render "Background Worker" supports this.
  - type: worker
    name: fleetos-gps
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install
    startCommand: npm run gps

    envVars:
      - key: NODE_ENV
        value: production
      - key: GPS_TCP_PORT
        value: "8080"
      - key: GPS_TCP_HOST
        value: "0.0.0.0"
      - key: GPS_SIGNAL_LOSS_THRESHOLD_MIN
        value: "10"
      - key: GEOFENCE_DEFAULT_RADIUS_M
        value: "200"
      - key: DATABASE_URL
        fromDatabase:
          name: fleetos-db
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        fromService:
          name: fleetos-api
          type: web
          envVarKey: JWT_SECRET
      - key: LOG_LEVEL
        value: "info"
      - key: DWELL_ALERT_THRESHOLD_MIN
        value: "60"

  # ── 3. PostgreSQL Database ───────────────────────────────────
databases:
  - name: fleetos-db
    plan: starter          # 1GB storage, upgrade as fleet grows
    region: oregon
    databaseName: fleetos
    user: fleetos_admin
    postgresMajorVersion: 16
